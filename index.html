<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo MFS</title>
    <!-- daisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <main class="flex justify-center items-center h-[100vh]">
        <div class="mockup-phone">

            <div class="camera"></div> 
            <div class="display">
              <div class="artboard artboard-demo phone-1">
                <div class="hero min-h-screen bg-base-200">
                  <div class="hero-content flex-col lg:flex-row-reverse">  
                    <div class="card flex-shrink-0 w-full max-w-sm shadow-2xl bg-base-100">
                      <form class="card-body">
                        <div class="form-control">
                          <label class="label">
                            <span class="label-text font-bold">Mobile Number</span>
                          </label>
                          <input id = "mobile-number" type="text" placeholder="Your Number" class="input input-bordered" required />
                        </div>
                        <div class="form-control">
                          <label class="label">
                            <span class="label-text font-bold">4 Digit Pin</span>
                          </label>
                          <input id="pin-number" type="text" placeholder="4 Digit Pin" class="input input-bordered" required />
                          <label class="label">
                            <a href="#" class="label-text-alt link link-hover">Forgot password?</a>
                          </label>
                        </div>
                        <div class="form-control mt-6">
                          <button id="btn-login" class="btn btn-primary">Login</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>

              </div>
            </div>
        </div>
    </main>
    <script src="js/login.js"></script>
</body>

</html>
